name: Mobile Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Prime Gradle wrapper
        run: npm run mobile:ensure-gradle

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release/mobile
          cp android/app/build/outputs/apk/debug/app-debug.apk release/mobile/Factory1-android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: factory1-android
          path: release/mobile/Factory1-android.apk

      - name: Attach Android APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/mobile/Factory1-android.apk

  ios:
    name: Prepare iOS project
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Archive unsigned iOS project
        run: |
          mkdir -p release/mobile
          zip -r release/mobile/Factory1-ios-project.zip ios capacitor.config.ts package.json package-lock.json

      - name: Upload iOS project artifact
        uses: actions/upload-artifact@v4
        with:
          name: factory1-ios-project
          path: release/mobile/Factory1-ios-project.zip

      - name: Attach iOS project to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/mobile/Factory1-ios-project.zip
