<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Factory1</title>
    <style>
      body {
        align-items: center;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        font-family: Arial, Helvetica, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      main {
        max-width: 320px;
        padding: 24px;
        text-align: center;
      }

      .mark {
        align-items: center;
        background: #2563eb;
        border-radius: 16px;
        color: #ffffff;
        display: inline-flex;
        font-size: 22px;
        font-weight: 700;
        height: 56px;
        justify-content: center;
        width: 56px;
      }

      h1 {
        font-size: 24px;
        margin: 18px 0 8px;
      }

      p {
        color: #475569;
        font-size: 14px;
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">F1</div>
      <h1>Factory1</h1>
      <p>Loading your Factory1 cloud workspace...</p>
